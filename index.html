<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0c0c10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Daniel Wisdom Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════
   TOKENS
═══════════════════════════════════ */
:root {
  --bg:        #0c0c10;
  --bg1:       #131318;
  --bg2:       #1a1a22;
  --bg3:       #22222c;
  --line:      rgba(255,255,255,0.06);
  --line2:     rgba(255,255,255,0.11);
  --txt:       #f0effe;
  --txt2:      #a09fc0;
  --mute:      #5a5872;
  --p:         #8b5cf6;
  --pk:        #ec4899;
  --or:        #f97316;
  --g:         linear-gradient(135deg,#8b5cf6,#ec4899,#f97316);
  --gx:        linear-gradient(135deg,#f97316,#ec4899,#8b5cf6);
  --nav:       58px;
  --bot:       70px;
  --r:         14px;
  --r2:        20px;
  --dp: 'Playfair Display', Georgia, serif;
  --ui: 'Space Grotesk', sans-serif;
  --mo: 'DM Mono', monospace;
  --ease: cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden;scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--ui);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--p);border-radius:9px}
img{display:block;max-width:100%}
button,a{cursor:pointer;font-family:inherit}
a{text-decoration:none;color:inherit}

/* ═══════════════════════════════════
   TOP NAV
═══════════════════════════════════ */
#topnav {
  position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:300;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  background:rgba(12,12,16,.92);backdrop-filter:blur(28px) saturate(160%);
  border-bottom:1px solid var(--line);
}
.logo-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-gem{
  width:30px;height:30px;border-radius:9px;
  background:var(--g);display:flex;align-items:center;
  justify-content:center;font-size:14px;
  box-shadow:0 0 18px rgba(139,92,246,.4);
}
.logo-text{
  font-family:var(--ui);font-weight:700;font-size:14px;
  background:var(--g);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;
}
.search-wrap{
  flex:1;max-width:280px;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:50px;display:flex;align-items:center;
  padding:0 12px;gap:7px;
  transition:border-color .2s,box-shadow .2s;
}
.search-wrap:focus-within{border-color:var(--p);box-shadow:0 0 0 3px rgba(139,92,246,.15)}
.search-wrap svg{width:14px;height:14px;opacity:.4;flex-shrink:0;fill:var(--txt)}
#searchInput{
  background:none;border:none;outline:none;color:var(--txt);
  font-family:var(--ui);font-size:13px;width:100%;padding:8px 0;
}
#searchInput::placeholder{color:var(--mute)}
.nav-icons{display:flex;gap:7px;margin-left:auto;flex-shrink:0}
.ni{
  width:34px;height:34px;border-radius:50%;background:var(--bg2);
  border:1px solid var(--line);display:flex;align-items:center;
  justify-content:center;font-size:15px;color:var(--txt);
  transition:all .2s var(--ease);flex-shrink:0;
}
.ni:hover{background:var(--bg3);transform:scale(1.08)}
.ni.has-dot{position:relative}
.ni.has-dot::after{
  content:'';position:absolute;top:7px;right:7px;
  width:6px;height:6px;border-radius:50%;
  background:var(--pk);border:2px solid var(--bg);
}

/* ═══════════════════════════════════
   VIEWS
═══════════════════════════════════ */
.view{display:none;padding-top:var(--nav);padding-bottom:calc(var(--bot)+16px);min-height:100vh}
.view.active{display:block}

/* ═══════════════════════════════════
   HERO SLIDER
═══════════════════════════════════ */
.hero{position:relative;overflow:hidden;height:clamp(280px,85vw,460px)}
.hero-track{
  display:flex;height:100%;
  transition:transform .8s var(--ease);
  will-change:transform;
}
.hero-slide{
  flex-shrink:0;width:100%;height:100%;
  background-size:cover;background-position:center;
  position:relative;
}
.hero-slide::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(12,12,16,.1) 0%,rgba(12,12,16,.55) 55%,rgba(12,12,16,.98) 100%);
}
.hero-body{
  position:absolute;bottom:0;left:0;right:0;
  padding:22px 18px;z-index:2;
}
.hero-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);border-radius:50px;
  padding:4px 12px;font-size:10px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:#fff;
  margin-bottom:9px;
}
.hero-q{
  font-family:var(--dp);font-style:italic;
  font-size:clamp(18px,5vw,26px);line-height:1.35;
  color:#fff;margin-bottom:6px;
}
.hero-a{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.5px}
.hero-dots{
  position:absolute;bottom:14px;right:16px;
  display:flex;gap:5px;z-index:3;
}
.hero-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,.3);cursor:pointer;
  transition:all .3s var(--ease);
}
.hero-dot.on{width:18px;border-radius:3px;background:#fff}
.hero-tap{position:absolute;inset:0;bottom:54px;z-index:2;cursor:pointer}

/* ═══════════════════════════════════
   SECTIONS
═══════════════════════════════════ */
.sec{padding:0 14px}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:22px 0 13px}
.sec-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:7px}
.sec-more{font-size:12px;color:var(--pk);background:none;border:none;font-family:var(--ui);cursor:pointer;padding:0}

/* ═══════════════════════════════════
   CATEGORY GRID
═══════════════════════════════════ */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cat-card{
  background:var(--bg1);border:1px solid var(--line);
  border-radius:var(--r);padding:13px 7px 11px;
  display:flex;flex-direction:column;align-items:center;
  gap:6px;cursor:pointer;position:relative;overflow:hidden;
  transition:all .22s var(--ease);text-align:center;
}
.cat-card::after{
  content:'';position:absolute;inset:0;
  background:var(--g);opacity:0;transition:opacity .3s;
}
.cat-card:hover,.cat-card.sel{
  border-color:var(--p);
  box-shadow:0 0 0 1px var(--p),0 6px 20px rgba(139,92,246,.2);
}
.cat-card.sel::after,.cat-card:hover::after{opacity:.07}
.cat-card:active{transform:scale(.95)}
.cat-icon{font-size:22px;position:relative;z-index:1}
.cat-label{
  font-size:9px;font-weight:700;color:var(--mute);
  text-transform:uppercase;letter-spacing:.4px;
  position:relative;z-index:1;line-height:1.2;
}
.cat-card.sel .cat-label{color:var(--p)}

/* ═══════════════════════════════════
   FILTER PILLS
═══════════════════════════════════ */
.pill-row{
  display:flex;gap:7px;overflow-x:auto;
  padding:2px 0 8px;scrollbar-width:none;
}
.pill-row::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;padding:7px 16px;border-radius:50px;
  background:var(--bg1);border:1px solid var(--line);
  font-size:12px;font-weight:600;color:var(--mute);
  cursor:pointer;transition:all .2s var(--ease);white-space:nowrap;
}
.pill:hover{border-color:var(--p);color:var(--txt)}
.pill.on{background:var(--g);border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(139,92,246,.35)}

/* ═══════════════════════════════════
   FEATURED
═══════════════════════════════════ */
.feat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.feat-card{
  border-radius:var(--r);overflow:hidden;
  position:relative;aspect-ratio:3/2;
  cursor:pointer;background-size:cover;background-position:center;
  transition:transform .22s var(--ease);
}
.feat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(139,92,246,.84),rgba(249,115,22,.6));
}
.feat-card:hover{transform:scale(1.03)}
.feat-card:active{transform:scale(.97)}
.feat-inner{
  position:relative;z-index:2;padding:12px 11px;
  height:100%;display:flex;flex-direction:column;justify-content:flex-end;
}
.feat-title{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.feat-count{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}

/* ═══════════════════════════════════
   TODAY CARD
═══════════════════════════════════ */
.today-card{
  border-radius:var(--r2);overflow:hidden;
  position:relative;padding:26px 20px;
  background-size:cover;background-position:center;
  cursor:pointer;transition:transform .2s var(--ease);
}
.today-card:active{transform:scale(.99)}
.today-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(139,92,246,.9),rgba(236,72,153,.72),rgba(249,115,22,.58));
}
.today-inner{position:relative;z-index:2}
.today-tag{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
  border-radius:50px;padding:4px 13px;
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;color:#fff;margin-bottom:13px;
}
.today-q{
  font-family:var(--dp);font-style:italic;
  font-size:clamp(18px,5.2vw,28px);line-height:1.35;
  color:#fff;margin-bottom:10px;
}
.today-a{font-size:12px;font-weight:600;color:rgba(255,255,255,.65)}
.today-actions{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap}
.t-btn{
  padding:9px 18px;border-radius:50px;
  font-family:var(--ui);font-size:11px;font-weight:700;
  border:none;display:flex;align-items:center;gap:5px;
  cursor:pointer;transition:all .18s var(--ease);
}
.t-btn:active{transform:scale(.94)}
.t-btn.w{background:#fff;color:#111}
.t-btn.g{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff}

/* ═══════════════════════════════════
   QUOTE GRID
═══════════════════════════════════ */
.q-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.q-card{
  border-radius:var(--r);overflow:hidden;
  position:relative;min-height:210px;
  background-size:cover;background-position:center;
  cursor:pointer;display:flex;flex-direction:column;
  justify-content:flex-end;
  transition:transform .22s var(--ease),box-shadow .22s;
  animation:cardIn .42s var(--ease) both;
}
.q-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(12,12,16,.03) 0%,rgba(12,12,16,.42) 45%,rgba(12,12,16,.95) 100%);
}
.q-card:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.q-card:active{transform:scale(.97)}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.q-inner{position:relative;z-index:2;padding:11px 10px}
.q-text{
  font-family:var(--dp);font-style:italic;
  font-size:13px;line-height:1.45;color:#fff;
  margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:4;
  -webkit-box-orient:vertical;overflow:hidden;
}
.q-author{
  font-size:9.5px;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;color:rgba(255,255,255,.5);
  margin-bottom:8px;
}
.q-btns{display:flex;gap:5px;flex-wrap:wrap}
.qb{
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.13);
  border-radius:50px;color:#fff;
  font-size:10px;font-family:var(--ui);font-weight:700;
  padding:4px 9px;display:flex;align-items:center;gap:3px;
  transition:all .18s var(--ease);white-space:nowrap;
}
.qb:hover{background:rgba(255,255,255,.18)}
.qb:active{transform:scale(.91)}
.qb.saved{background:rgba(139,92,246,.32);border-color:var(--p);color:#c4b5fd}

/* ═══════════════════════════════════
   ARTICLES
═══════════════════════════════════ */
.art-list{display:flex;flex-direction:column;gap:10px}
.art-card{
  background:var(--bg1);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;
  display:flex;cursor:pointer;
  transition:all .22s var(--ease);
}
.art-card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,92,246,.15)}
.art-thumb{width:90px;height:80px;flex-shrink:0;background-size:cover;background-position:center}
.art-body{padding:11px 12px;flex:1;min-width:0}
.art-tag{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.5px;background:var(--g);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:4px;
}
.art-title{
  font-size:13px;font-weight:700;line-height:1.25;
  margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.art-preview{
  font-size:11.5px;color:var(--txt2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

/* ═══════════════════════════════════
   VIRAL (EXPLORE) FEED
═══════════════════════════════════ */
#view-explore{padding-top:var(--nav);padding-bottom:0}
.viral-wrap{
  height:calc(100vh - var(--nav) - var(--bot));
  overflow-y:scroll;scroll-snap-type:y mandatory;
  scrollbar-width:none;overscroll-behavior:contain;
}
.viral-wrap::-webkit-scrollbar{display:none}
.v-slide{
  height:calc(100vh - var(--nav) - var(--bot));
  width:100%;scroll-snap-align:start;scroll-snap-stop:always;
  position:relative;background-size:cover;background-position:center;
  display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;
}
.v-slide::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(12,12,16,.06) 0%,rgba(12,12,16,.48) 50%,rgba(12,12,16,.97) 100%);
  z-index:1;
}
.v-prog{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:rgba(255,255,255,.12);z-index:4;
}
.v-prog-bar{height:100%;background:var(--g);width:0%;transition:width .12s linear}
.v-body{position:relative;z-index:2;padding:20px 16px 20px}
.v-cat{
  display:inline-block;margin-bottom:9px;
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;background:var(--g);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.v-q{
  font-family:var(--dp);font-style:italic;
  font-size:clamp(22px,6vw,34px);line-height:1.3;
  color:#fff;margin-bottom:10px;
}
.v-a{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:18px}
.v-acts{display:flex;gap:9px}
.v-btn{
  padding:10px 18px;border-radius:50px;font-family:var(--ui);
  font-size:11px;font-weight:700;border:none;
  display:flex;align-items:center;gap:5px;
  cursor:pointer;transition:all .18s var(--ease);
}
.v-btn:active{transform:scale(.93)}
.v-btn.s{background:rgba(255,255,255,.93);color:#111}
.v-btn.g{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff}
.v-side{
  position:absolute;right:13px;
  bottom:80px;
  z-index:3;display:flex;flex-direction:column;gap:13px;
}
.v-sib{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;color:#fff;cursor:pointer;
}
.v-sic{
  width:41px;height:41px;border-radius:50%;
  background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;border:1px solid rgba(255,255,255,.14);
  transition:all .2s;
}
.v-sib:active .v-sic{transform:scale(.86)}
.v-sil{font-size:9px;font-weight:700;color:rgba(255,255,255,.6)}

/* ═══════════════════════════════════
   FULLSCREEN MODAL
═══════════════════════════════════ */
#fsModal{
  position:fixed;inset:0;z-index:500;
  opacity:0;pointer-events:none;
  transition:opacity .32s var(--ease);
}
#fsModal.open{opacity:1;pointer-events:all}
.fs-bg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
.fs-track-wrap{position:absolute;inset:0;overflow:hidden}
.fs-track{
  display:flex;height:100%;
  will-change:transform;
  transition:transform .44s var(--ease);
}
.fs-slide{
  flex-shrink:0;width:100vw;height:100%;
  background-size:cover;background-position:center;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.fs-slide::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(12,12,16,.22) 0%,rgba(12,12,16,.65) 100%);
}
.fs-content{
  position:relative;z-index:2;
  padding:80px 24px 140px;
  width:100%;max-width:600px;text-align:center;
}
.fs-cat{
  display:inline-block;margin-bottom:16px;
  padding:4px 14px;border-radius:50px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);
  font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:#fff;
}
.fs-q{
  font-family:var(--dp);font-style:italic;
  font-size:clamp(24px,6vw,38px);line-height:1.3;
  color:#fff;margin-bottom:16px;
}
.fs-a{font-size:14px;font-weight:600;color:rgba(255,255,255,.6)}
/* Bottom action bar */
.fs-actions{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 16px calc(env(safe-area-inset-bottom,0px)+20px);
  background:linear-gradient(transparent,rgba(12,12,16,.88));
  z-index:3;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
.fs-btn{
  padding:11px 20px;border-radius:50px;
  font-family:var(--ui);font-size:12px;font-weight:700;
  border:none;display:flex;align-items:center;gap:6px;
  cursor:pointer;transition:all .18s var(--ease);
}
.fs-btn:active{transform:scale(.93)}
.fs-btn.white{background:rgba(255,255,255,.94);color:#111}
.fs-btn.ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff}
.fs-btn.sv{background:rgba(139,92,246,.38);border:1px solid rgba(139,92,246,.55);color:#c4b5fd}
/* Close + arrows */
.fs-close{
  position:absolute;top:calc(env(safe-area-inset-top,0px)+12px);right:14px;
  z-index:4;width:37px;height:37px;border-radius:50%;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.fs-close:hover{background:rgba(255,255,255,.18)}
.fs-arr{
  position:absolute;top:50%;transform:translateY(-50%);z-index:4;
  width:37px;height:37px;border-radius:50%;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:19px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.fs-arr:hover{background:rgba(255,255,255,.2)}
.fs-al{left:12px}.fs-ar{right:12px}
.fs-counter{
  position:absolute;top:calc(env(safe-area-inset-top,0px)+16px);
  left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:700;color:rgba(255,255,255,.5);
  background:rgba(0,0,0,.28);padding:3px 11px;border-radius:50px;
  backdrop-filter:blur(8px);z-index:4;white-space:nowrap;
}
.fs-hint{
  position:absolute;bottom:105px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(255,255,255,.35);z-index:4;
  white-space:nowrap;pointer-events:none;
  animation:blink 2.5s infinite;
}

═══════════════════════════════════════════ */
function loadData() {
  try { Q = JSON.parse(localStorage.getItem('dwh_q') || 'null') || DQ; } catch { Q = DQ; }
  try { A = JSON.parse(localStorage.getItem('dwh_a') || 'null') || DA; } catch { A = DA; }
  Q.forEach(q => { if (!q.id) q.id = Date.now() + Math.random(); ensureBg(q); });
  try { bgMap = JSON.parse(localStorage.getItem('dwh_bg') || '{}') || {}; } catch { bgMap = {}; }
  try { savedIds = new Set(JSON.parse(localStorage.getItem('dwh_sv') || '[]')); } catch { savedIds = new Set(); }
}

function persist() {
  localStorage.setItem('dwh_sv', JSON.stringify([...savedIds]));
  localStorage.setItem('dwh_bg', JSON.stringify(bgMap));
}

/* ═══════════════════════════════════════════
   DOWNLOAD + WATERMARK (Canvas)
═══════════════════════════════════════════ */
function dlQuote(id) {
  const q = Q.find(q => q.id === id);
  if (!q) return;
  const bi = bgMap[id] || 0;
  const src = q.bgOptions?.[bi] || q.img;
  showToast('📥 Preparing download…');
  const cv = document.createElement('canvas');
  cv.width = 1080; cv.height = 1080;
  const ctx = cv.getContext('2d');

  function draw(img) {
    // Background
    if (img) { ctx.drawImage(img, 0, 0, 1080, 1080); }
    else {
      const gd = ctx.createLinearGradient(0, 0, 1080, 1080);
      gd.addColorStop(0, '#1a0533'); gd.addColorStop(1, '#0c0c10');
      ctx.fillStyle = gd; ctx.fillRect(0, 0, 1080, 1080);
    }
    // Overlay
    const ov = ctx.createLinearGradient(0, 160, 0, 1080);
    ov.addColorStop(0, 'rgba(12,12,16,.08)'); ov.addColorStop(1, 'rgba(12,12,16,.92)');
    ctx.fillStyle = ov; ctx.fillRect(0, 0, 1080, 1080);
    // Quote text
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.font = 'italic 700 44px "Georgia", serif';
    ctx.shadowColor = 'rgba(0,0,0,.55)'; ctx.shadowBlur = 14;
    const words = ('"' + q.q + '"').split(' ');
    let lines = [], line = '';
    words.forEach(w => {
      const test = line + (line ? ' ' : '') + w;
      if (ctx.measureText(test).width > 900) { lines.push(line); line = w; }
      else line = test;
    });
    lines.push(line);
    const lineH = 62, startY = 540 - (lines.length * lineH) / 2 + lineH / 2;
    lines.forEach((l, i) => ctx.fillText(l, 540, startY + i * lineH));
    // Author
    ctx.font = '600 26px "Space Grotesk", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.62)'; ctx.shadowBlur = 6;
    ctx.fillText('— ' + q.a, 540, startY + lines.length * lineH + 38);
    // Watermark
    ctx.font = '700 19px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.textAlign = 'right'; ctx.shadowBlur = 5;
    ctx.fillText('Daniel Wisdom Hub', 1056, 1052);
    // Export
    const link = document.createElement('a');
    link.download = `daniel-wisdomhub-${Date.now()}.jpg`;
    link.href = cv.toDataURL('image/jpeg', .92);
    link.click();
    showToast('✅ Downloaded!');
  }

  if (src) {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => draw(img);
    img.onerror = () => draw(null);
    img.src = src;
  } else draw(null);
}

/* ═══════════════════════════════════════════
   FULLSCREEN MODAL + SWIPE
═══════════════════════════════════════════ */
function openFS(quotes, idx = 0) {
  fsQ = quotes; fsIdx = idx;
  // Build slides
  document.getElementById('fsTrack').innerHTML = fsQ.map(q => {
    const bi = bgMap[q.id] || 0, bg = q.bgOptions?.[bi] || q.img;
    return `<div class="fs-slide" id="fss${q.id}" style="background-image:url('${bg}')">
      <div class="fs-content">
        <div class="fs-cat">${q.cat}</div>
        <div class="fs-q">"${q.q}"</div>
        <div class="fs-a">— ${q.a}</div>
      </div>
    </div>`;
  }).join('');
  goFS(idx, false);
  document.getElementById('fsModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  // Hide hint after 3s
  setTimeout(() => { const h = document.getElementById('fsHint'); if(h) h.style.opacity='0'; }, 3000);
}

function goFS(i, animate = true) {
  if (!fsQ.length) return;
  fsIdx = Math.max(0, Math.min(i, fsQ.length - 1));
  const trk = document.getElementById('fsTrack');
  trk.style.transition = animate ? 'transform .44s cubic-bezier(.4,0,.2,1)' : 'none';
  trk.style.transform = `translateX(-${fsIdx * 100}vw)`;
  // Counter
  document.getElementById('fsCounter').textContent = `${fsIdx + 1} / ${fsQ.length}`;
  // Arrows
  document.getElementById('fsAL').style.opacity = fsIdx === 0 ? '.3' : '1';
  document.getElementById('fsAR').style.opacity = fsIdx === fsQ.length-1 ? '.3' : '1';
  // Action bar
  const q = fsQ[fsIdx];
  const sv = savedIds.has(q.id);
  document.getElementById('fsActions').innerHTML = `
    <button class="fs-btn white" onclick="dlQuote(${q.id})">⬇️ Download</button>
    <button class="fs-btn${sv?' sv':' ghost'}" id="fsSave" data-id="${q.id}" onclick="toggleSave(${q.id},this)">${sv?'🔖 Saved':'💾 Save'}</button>
    <button class="fs-btn ghost" onclick="cycBg(${q.id},true)">🎨 Change BG</button>`;
}

function fsNext() { if (fsIdx < fsQ.length - 1) goFS(fsIdx + 1); }
function fsPrev() { if (fsIdx > 0) goFS(fsIdx - 1); }

function closeFS() {
  document.getElementById('fsModal').classList.remove('open');
  document.body.style.overflow = '';
}

// Touch swipe
let ts = 0, tx = 0;
document.getElementById('fsModal').addEventListener('touchstart', e => {
  ts = e.touches[0].clientX; tx = e.touches[0].clientY;
}, { passive: true });
document.getElementById('fsModal').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - ts;
  const dy = e.changedTouches[0].clientY - tx;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) { dx < 0 ? fsNext() : fsPrev(); }
}, { passive: true });
// Keyboard
document.addEventListener('keydown', e => {
  if (!document.getElementById('fsModal').classList.contains('open')) return;
  if (e.key === 'ArrowRight') fsNext();
  else if (e.key === 'ArrowLeft') fsPrev();
  else if (e.key === 'Escape') closeFS();
});

/* ═══════════════════════════════════════════
   VIRAL FEED (TikTok-style)
═══════════════════════════════════════════ */
function initViral() {
  const wrap = document.getElementById('viralWrap');
  if (wrap.children.length > 0) return;
  const pool = shuffle(Q);
  wrap.innerHTML = pool.map((q, i) => {
    const bg = q.bgOptions?.[bgMap[q.id] || 0] || q.img;
    const sv = savedIds.has(q.id);
    return `<div class="v-slide" style="background-image:url('${bg}')">
      <div class="v-prog"><div class="v-prog-bar" id="vb${i}"></div></div>
      <div class="v-side">
        <button class="v-sib" onclick="toggleSave(${q.id},this)">
          <div class="v-sic">${sv?'🔖':'💾'}</div>
          <div class="v-sil">${sv?'Saved':'Save'}</div>
        </button>
        <button class="v-sib" onclick="dlQuote(${q.id})">
          <div class="v-sic">⬇️</div><div class="v-sil">Download</div>
        </button>
        <button class="v-sib" onclick="cycBg(${q.id})">
          <div class="v-sic">🎨</div><div class="v-sil">BG</div>
        </button>
      </div>
      <div class="v-body">
        <div class="v-cat">${q.cat}</div>
        <div class="v-q">"${q.q}"</div>
        <div class="v-a">— ${q.a}</div>
        <div class="v-acts">
          <button class="v-btn s" onclick="openFS(pool,${i})">Expand ↗</button>
          <button class="v-btn g" onclick="goView('home')">← Home</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Define pool for onclick closure
  window._viralPool = pool;
  // Fix onclick to use window._viralPool
  wrap.querySelectorAll('.v-slide').forEach((slide, i) => {
    slide.querySelector('.v-btn.s').onclick = () => openFS(window._viralPool, i);
  });

  startViral(pool.length);

  wrap.addEventListener('touchstart', () => { viralPaused = true; clearInterval(viralTimer); clearInterval(viralProg); }, { passive: true });
  wrap.addEventListener('touchend', () => { setTimeout(() => { viralPaused = false; startViral(pool.length); }, 3500); }, { passive: true });
}

function startViral(total) {
  if (viralPaused) return;
  clearInterval(viralTimer); clearInterval(viralProg);
  const DUR = 5000; let elapsed = 0;
  const bar = () => document.getElementById('vb' + viralIdx);
  if (bar()) { bar().style.width = '0%'; }
  viralProg = setInterval(() => {
    elapsed += 100;
    const b = bar(); if (b) b.style.width = Math.min(elapsed / DUR * 100, 100) + '%';
  }, 100);
  viralTimer = setInterval(() => {
    clearInterval(viralProg); elapsed = 0;
    viralIdx = (viralIdx + 1) % total;
    const slides = document.querySelectorAll('.v-slide');
    if (slides[viralIdx]) slides[viralIdx].scrollIntoView({ behavior: 'smooth' });
    if (bar()) bar().style.width = '0%';
    viralProg = setInterval(() => {
      elapsed += 100;
      const b = bar(); if (b) b.style.width = Math.min(elapsed / DUR * 100, 100) + '%';
    }, 100);
  }, DUR);
}

  const grid = document.getElementById('savedGrid');
  const empty = document.getElementById('savedEmpty');
  const arr = Q.filter(q => savedIds.has(q.id));
  grid.innerHTML = '';
  if (!arr.length) {
    empty.innerHTML = `<div class="saved-empty">
      <div class="saved-empty-icon">🔖</div>
      <div class="saved-empty-h">Nothing saved yet</div>
      <div class="saved-empty-s">Tap 💾 on any quote to save it here for offline reading</div>
    </div>`;
    return;
  }
  empty.innerHTML = '';
  arr.forEach((q, i) => {
    const bg = q.bgOptions?.[bgMap[q.id] || 0] || q.img;
    const d = document.createElement('div');
    d.className = 'q-card';
    d.style.cssText = `background-image:url('${bg}');animation-delay:${i*.07}s`;
    d.innerHTML = `<div class="q-inner">
      <div class="q-text">"${q.q}"</div>
      <div class="q-author">— ${q.a}</div>
      <div class="q-btns">
        <button class="qb saved" onclick="event.stopPropagation();removeSaved(${q.id})">🗑️ Remove</button>
        <button class="qb" onclick="event.stopPropagation();dlQuote(${q.id})">⬇️</button>
      </div>
    </div>`;
    d.addEventListener('click', () => openFS(arr, i));
    grid.appendChild(d);
  });
}

function removeSaved(id) {
  savedIds.delete(id); persist(); renderSaved();
  showToast('Removed from saved');
}

/* ═══════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════ */
function renderProfile() {
  const notifOn = localStorage.getItem('dwh_notif') === 'on';
  document.getElementById('profStats').innerHTML = [
    { n: Q.length, l: 'Total Quotes' },
    { n: savedIds.size, l: 'Saved' },
    { n: A.length, l: 'Articles' },
  ].map(s => `<div class="ps"><div class="ps-n">${s.n}</div><div class="ps-l">${s.l}</div></div>`).join('');

  document.getElementById('profMenu').innerHTML = `
    <div class="pm" onclick="window.location='admin.html'">
      <div class="pm-ic">⚙️</div>
      <div class="pm-tx"><div class="pm-h">Admin Panel</div><div class="pm-s">Manage quotes, articles & AI generator</div></div>
      <div class="pm-arr">›</div>
    </div>
    <div class="pm" onclick="toggleNotifSetting()">
      <div class="pm-ic">🔔</div>
      <div class="pm-tx"><div class="pm-h">Daily Notifications</div><div class="pm-s">Get your wisdom quote at 8 AM daily</div></div>
      <div class="tog${notifOn?' on':''}" id="notifTog"><div class="tog-k"></div></div>
    </div>
    <div class="pm" onclick="sendTestNotif()">
      <div class="pm-ic">📢</div>
      <div class="pm-tx"><div class="pm-h">Test Notification</div><div class="pm-s">Preview what your daily alert looks like</div></div>
      <div class="pm-arr">›</div>
    </div>
    <div class="pm" onclick="resetAll()">
      <div class="pm-ic">🗑️</div>
      <div class="pm-tx"><div class="pm-h">Reset All Data</div><div class="pm-s">Clear saved quotes and preferences</div></div>
      <div class="pm-arr">›</div>
    </div>`;
}

function _notifUI(on) {
  const tog = document.getElementById('notifTog');
  if (tog) tog.classList.toggle('on', on);
  const bell = document.getElementById('notifBtn');
  if (bell) on ? bell.classList.remove('has-dot') : bell.classList.add('has-dot');
}
function toggleNotifSetting() {
  if (localStorage.getItem('dwh_notif') === 'on') {
    localStorage.setItem('dwh_notif', 'off');
    _notifUI(false);
    showToast('Notifications disabled');
  } else {
    reqNotif();
  }
}

function resetAll() {
  if (!confirm('Reset all data? This cannot be undone.')) return;
  ['dwh_q','dwh_a','dwh_bg','dwh_sv','dwh_notif','dwh_nb'].forEach(k => localStorage.removeItem(k));
  location.reload();
}

/* ═══════════════════════════════════════════
   PUSH NOTIFICATIONS
═══════════════════════════════════════════ */
async function reqNotif() {
  dismissBanner();
  if (!('Notification' in window)) { showToast('❌ Notifications not supported'); return; }
  try {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      localStorage.setItem('dwh_notif', 'on');
      _notifUI(true);
      showToast('✅ Notifications enabled!');
      scheduleDaily();
      // Try push subscription via SW
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready.catch(() => null);
        if (reg?.periodicSync) {
          await reg.periodicSync.register('dwh-daily', { minInterval: 86400000 }).catch(() => {});
        }
      }
    } else {
      showToast('Permission denied');
    }
  } catch { showToast('Could not enable notifications'); }
}

function dismissBanner() {
  const b = document.getElementById('notifBanner');
  if (b) b.classList.add('gone');
  localStorage.setItem('dwh_nb', '1');
}

function scheduleDaily() {
  const now = new Date(), next = new Date(now);
  next.setHours(8, 0, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  setTimeout(() => { fireNotif(); setInterval(fireNotif, 86400000); }, next - now);
}

function _doNotify(title, opts) {
  if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
    navigator.serviceWorker.ready.then(r => r.showNotification(title, opts)).catch(() => { try { new Notification(title, opts); } catch(e) {} });
  } else { try { new Notification(title, opts); } catch(e) {} }
}
function fireNotif() {
  if (Notification.permission !== 'granted') return;
  const q = Q[Math.floor(Date.now() / 86400000) % Q.length];
  if (!q) return;
  const s = q.q.length > 80 ? q.q.substring(0,80)+'…' : q.q;
  _doNotify('Daniel Wisdom Hub ✨', { body:`"${s}" — ${q.a}`, tag:'dwh-daily', icon:'/icon.png', vibrate:[200,100,200], data:{url:'/'} });
}

function sendTestNotif() {
  if (!('Notification' in window)) { showToast('❌ Not supported'); return; }
  if (Notification.permission !== 'granted') { showToast('⚠️ Enable notifications first'); reqNotif(); return; }
  const q = Q[Math.floor(Date.now() / 86400000) % Q.length];
  if (!q) return;
  const s = q.q.length > 80 ? q.q.substring(0,80)+'…' : q.q;
  _doNotify('Daniel Wisdom Hub ✨', { body:`"${s}" — ${q.a}`, tag:'dwh-test', icon:'/icon.png', vibrate:[200,100,200] });
  showToast('📢 Test notification sent!');
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
document.getElementById('searchInput').addEventListener('input', e => {
  const term = e.target.value.toLowerCase().trim();
  feedQ = term ? Q.filter(q => q.q.toLowerCase().includes(term) || q.a.toLowerCase().includes(term)) : applyFilter(curFilter);
  feedPage = 0;
  if (curView === 'home') renderFeed(true);
});

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2700);
}

/* ═══════════════════════════════════════════
   SERVICE WORKER
═══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

═══════════════════════════════════════════ */
loadData();
feedQ = [...Q];

buildHero();
buildCats();
buildPills();
buildToday();
renderArts();
renderFeed(true);

ioFeed.observe(document.getElementById('feedLoader'));

// Notif banner
if (localStorage.getItem('dwh_nb') || localStorage.getItem('dwh_notif') === 'on' || !('Notification' in window)) {
  document.getElementById('notifBanner').classList.add('gone');
}
if (localStorage.getItem('dwh_notif') === 'on') {
  _notifUI(true);
  scheduleDaily();
}
if (savedIds.size > 0) document.getElementById('savedPip')?.classList.add('show');

// Cross-tab data sync
window.addEventListener('storage', e => {
  if (e.key === 'dwh_q' || e.key === 'dwh_a') {
    loadData(); feedQ = [...Q];
    buildHero(); buildToday(); renderArts(); renderFeed(true);
    showToast('🔄 Content updated from admin!');
  }
});
</script>
